{% extends 'base.html' %}
{% block content %}
<div class="form-page-wrapper">
    <div class="form-card">
        <div class="form-header">
            <span class="heritage-accent">Archive Classification</span>
            <h1>{{ title }}</h1>
        </div>
        <form method="post" class="heritage-form">
            {% csrf_token %}
            <div class="form-grid">
                {% for field in form %}
                    <div class="form-group">
                        <label>{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}<span class="error-message">{{ field.errors.0 }}</span>{% endif %}
                    </div>
                {% endfor %}
            </div>
            <div class="form-actions">
                <a href="{% url 'categories:list' %}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-primary">Save Era</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
